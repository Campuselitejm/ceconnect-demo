<style>

  html, body { width: 100%; height: 100%; }

  else if(n.type==="connect_accepted") text=<span><b>{a?.name}</b> accepted your {typeLabel}</span>;
  else if(n.type==="points") text=<span><b>{a?.name}</b> sent you <span className="pt">{n.data?.amount} CEP</span></span>;
  else if(n.type==="announcement") text=n.data?.badge?<span>You earned the <span className="tr">{BADGES[n.data.badge]?.n}</span> badge</span>:<span>Achievement: <span className="tr">{n.data?.text}</span></span>;
  else text=<span>Notification</span>;
  return (
    <div className="fi" style={{flexDirection:"column",alignItems:"stretch",opacity:n.read?0.8:1}}>
      <div style={{display:"flex",alignItems:"center",gap:11,cursor:isReq?"pointer":"default"}} onClick={()=>isReq&&a&&openProfile(a.id)}>
        <Avatar id={a?.id} name={a?.role==="admin"?"CE":a?.name} url={a?.avatar_url} cls="fa"/>
        <div className="fb"><div className="ft">{text}</div><div className="ft-tm">{timeAgo(n.created_at)}</div></div>
      </div>
      {isReq&&(
        <div style={{marginTop:10}}>
          {n.conn_type==="private"&&choosing&&(
            <div className="edit-conn" style={{marginBottom:10,marginTop:0}}>
              <div className="ec-row"><div className="ec-lbl">Reveal Instagram</div><div className={"toggle"+(ig?" on":"")} onClick={()=>setIg(!ig)}></div></div>
              <div className="ec-row"><div className="ec-lbl">Reveal WhatsApp</div><div className={"toggle"+(wa?" on":"")} onClick={()=>setWa(!wa)}></div></div>
            </div>
          )}
          <div style={{display:"flex",gap:7}}>
            {n.conn_type==="private"&&!choosing
              ? <button className="m-btn green" style={{flex:1,padding:"9px"}} onClick={()=>setChoosing(true)}>Accept…</button>
              : <button className="m-btn green" style={{flex:1,padding:"9px"}} onClick={()=>respond("accept")}>Accept</button>}
            <button className="connect-btn pending" style={{flex:1,padding:"9px",fontSize:12}} onClick={()=>respond("ignore")}>Ignore</button>
            <button className="connect-btn pending" style={{flex:1,padding:"9px",fontSize:12,color:"#FF9DBE"}} onClick={()=>respond("block")}>Block</button>
          </div>
        </div>
      )}
    </div>
  );
}

function MeProfile({ me, priv, reload, setPriv, flash }) {
  const [ig,setIg]=useState(priv?.ig_handle||""); const [wa,setWa]=useState(priv?.wa_number||"");
  const [avail,setAvail]=useState(me.available_to_connect);
  useEffect(()=>{setIg(priv?.ig_handle||"");setWa(priv?.wa_number||"");},[priv]);
  async function saveContacts(){
    const {error}=await sb.from("user_private").update({ig_handle:ig,wa_number:wa}).eq("user_id",me.id);
    if(error){flash(error.message);return;}
    setPriv({...priv,ig_handle:ig,wa_number:wa}); flash("Contact info saved");
  }
  async function toggleAvail(){
    const v=!avail; setAvail(v);
    const {error}=await sb.from("profiles").update({available_to_connect:v}).eq("id",me.id);
    if(error){flash(error.message);setAvail(!v);return;}
    reload(); flash(v?"Open to connect":"Set to away");
  }
  const badgeKeys=Object.keys(BADGES);
  const earned=badgeKeys.filter(k=>me.badges&&me.badges[k]).length;
  return (
    <div className="content">
      <div className="page-head"><div className="page-spacer"></div><div className="page-title">Profile</div><div className="page-spacer"></div></div>
      <div className="ph">
        <Avatar id={me.id} name={me.name} url={me.avatar_url} cls="pa"/>
        <div className="pn">{me.name}</div>
        <div className="pun">{me.university||"—"}{me.role==="admin"?" · CE Admin":""}</div>
        <div className="pcid"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>{ceid(me.id)}</div>
      </div>
      <div className="pst">
        <div className="psi"><div className="psv" style={{color:"#4ADE80"}}>{priv?priv.points:"—"}</div><div className="psl">CEP</div></div>
        <div className="psi"><div className="psv" style={{color:"#FFB547"}}>{earned}</div><div className="psl">Badges</div></div>
        <div className="psi"><div className="psv" style={{color:"#FF3D8A"}}>{avail?"On":"Off"}</div><div className="psl">Open</div></div>
      </div>

      <div className="sh"><div className="sh-t" style={{fontSize:14}}>Availability</div></div>
      <div className="edit-conn" style={{marginTop:0}}>
        <div className="ec-row"><div><div className="ec-lbl">Open to connect</div><div className="ec-sub">Off = no one can send requests. Badges stay visible.</div></div><div className={"toggle"+(avail?" on":"")} onClick={toggleAvail}></div></div>
      </div>

      <div className="sh"><div className="sh-t" style={{fontSize:14}}>Private Contacts</div></div>
      <div className="card-plain">
        <div className="ec-sub" style={{marginBottom:6}}>Only revealed to people you approve on a Private Connect.</div>
        <input className="auth-input" placeholder="Instagram @handle" value={ig} onChange={e=>setIg(e.target.value)}/>
        <input className="auth-input" placeholder="WhatsApp number" value={wa} onChange={e=>setWa(e.target.value)}/>
        <button className="auth-btn" onClick={saveContacts}>Save changes</button>
      </div>

      <div className="sh"><div className="sh-t" style={{fontSize:14}}>Badges <span className="conn-count">{earned} / {badgeKeys.length}</span></div></div>
      <div className="badge-grid">
        {badgeKeys.map(k=>{
          const on=me.badges&&me.badges[k];
          return (
            <div key={k} className={"badge"+(on?" earned":"")}>
              {on&&<div className="badge-check"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#0B0E2C" strokeWidth="4" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>}
              <div className={"badge-ic "+k}>{BADGES[k].i}</div>
              <div className="badge-n">{BADGES[k].n}</div>
            </div>
          );
        })}
      </div>

      <button className="connect-btn pending" style={{width:"100%",marginTop:20,justifyContent:"center"}} onClick={()=>sb.auth.signOut()}>Log out</button>
    </div>
  );
}

function miniText(e){
  const p=e.payload||{};
  if(e.type==="apply")return `applied to ${p.activity}`;
  if(e.type==="transfer")return `sent ${p.amount} CEP`;
  if(e.type==="connect")return `made a CE connection`;
  if(e.type==="badge")return `awarded ${BADGES[p.badge]?.n||p.badge}`;
  if(e.type==="achievement")return p.text;
  return "activity";
}

function ProfileModal({ targetId, me, onClose, flash, reload }) {
  const [p,setP]=useState(null); const [connPriv,setConnPriv]=useState(null);
  const [mini,setMini]=useState([]); const [amount,setAmount]=useState("");
  const [award,setAward]=useState("varsity"); const [ach,setAch]=useState("");

  const load=useCallback(async()=>{
    const {data}=await sb.rpc("get_profile",{target:targetId}); setP(data);
    const {data:c}=await sb.from("connections").select("*").eq("conn_type","private").or(`and(requester_id.eq.${me.id},addressee_id.eq.${targetId}),and(requester_id.eq.${targetId},addressee_id.eq.${me.id})`).order("updated_at",{ascending:false}).limit(1).maybeSingle();
    setConnPriv(c);
    if(data&&data.ce_status==="accepted"){
      const {data:ev}=await sb.from("activity_events").select("*").eq("actor_id",targetId).order("created_at",{ascending:false}).limit(5);
      setMini(ev||[]);
    } else setMini([]);
  },[targetId,me.id]);
  useEffect(()=>{load();},[load]);

  if(!p) return <><div className="modal-bg" onClick={onClose}></div><div className="modal-sheet"><div className="modal-handle"></div><div className="modal-body"><div className="empty">Loading…</div></div></div></>;
  if(p.blocked) return <><div className="modal-bg" onClick={onClose}></div><div className="modal-sheet"><div className="modal-handle"></div><div className="modal-body"><div className="empty">This profile is unavailable.</div></div></div></>;

  const ce=p.ce_status, pv=p.private_status;
  const iAmReq=connPriv?.requester_id===me.id;
  const myIg=connPriv?(iAmReq?connPriv.requester_share_ig:connPriv.addressee_share_ig):false;
  const myWa=connPriv?(iAmReq?connPriv.requester_share_wa:connPriv.addressee_share_wa):false;
  const badgeKeys=Object.keys(BADGES);
  const earned=badgeKeys.filter(k=>p.badges&&p.badges[k]).length;

  async function req(ctype){
    const {data}=await sb.rpc("send_connection_request",{target:targetId,ctype});
    if(data&&data.error){flash({unavailable:"Not accepting requests.",already_pending:"Already pending.",already_connected:"Already connected.",ignored:"Ignored recently — try again in 2 days."}[data.error]||data.error);return;}
    flash("Request sent"); load(); reload();
  }
  async function sendPoints(){
    const amt=parseInt(amount,10);
    const {data}=await sb.rpc("transfer_points",{target:targetId,amount:amt});
    if(data&&data.error){flash({not_ce_connected:"CE Connect required.",insufficient:"Not enough points.",bad_amount:"Enter a valid amount."}[data.error]||data.error);return;}
    flash(`Sent ${amt} CEP`); setAmount(""); load(); reload();
  }
  async function saveShares(field,val){
    if(!connPriv)return;
    const nextIg=field==="ig"?val:myIg, nextWa=field==="wa"?val:myWa;
    const {data}=await sb.rpc("update_my_shares",{conn_id:connPriv.id,share_ig:nextIg,share_wa:nextWa});
    if(data&&data.error){flash(data.error);return;}
    load(); flash("Connection updated");
  }
  async function awardBadge(){ const{data}=await sb.rpc("admin_award_badge",{target:targetId,badge_key:award}); if(data&&data.error){flash(data.error);return;} flash("Badge awarded"); load(); reload(); }
  async function assignAch(){ if(!ach.trim())return; const{data}=await sb.rpc("admin_assign_achievement",{target:targetId,text_body:ach.trim()}); if(data&&data.error){flash(data.error);return;} flash("Announced"); setAch(""); reload(); }

  function ceBtn(){
    if(ce==="accepted")return <button className="connect-btn connected">✓ CE Connected</button>;
    if(ce==="pending")return <button className="connect-btn pending">CE Pending</button>;
    if(!p.available_to_connect)return <button className="connect-btn pending">Not available</button>;
    return <button className="connect-btn ce" onClick={()=>req("ce")}>CE Connect</button>;
  }
  function pvBtn(){
    if(pv==="accepted")return <button className="connect-btn connected">✓ Private</button>;
    if(pv==="pending")return <button className="connect-btn pending">Private Pending</button>;
    if(!p.available_to_connect)return <button className="connect-btn pending">Not available</button>;
    return <button className="connect-btn" onClick={()=>req("private")}>Private Connect</button>;
  }

  return (
    <>
      <div className="modal-bg" onClick={onClose}></div>
      <div className="modal-sheet">
        <div className="modal-handle"></div>
        <div className="modal-close" onClick={onClose}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
        <div className="modal-body">
          <div className="mp-hero">
            <Avatar id={p.id} name={p.name} url={p.avatar_url} cls="mp-avatar"/>
            <div className="mp-name">{p.name}</div>
            <div className="mp-meta">{p.university}{p.major?<><span className="dot"></span>{p.major}</>:""}{p.role==="admin"?<><span className="dot"></span>CE Admin</>:""}</div>
          </div>

          <div className="connect-cta">{ceBtn()}{pvBtn()}</div>

          {ce==="accepted"&&(
            <div>
              <div className="m-sh"><div className="m-sh-t">Send CE Points</div></div>
              <div className="msend">
                <input className="m-input" type="number" placeholder="Amount" value={amount} onChange={e=>setAmount(e.target.value)}/>
                <button className="m-btn" onClick={sendPoints}>Send</button>
              </div>
            </div>
          )}

          {pv==="accepted"&&(p.ig_handle||p.wa_number)&&(
            <div className="contact-chips">
              {p.ig_handle&&<div className="cc-chip ig"><div className="cc-ic">📸</div><div className="cc-body"><div className="cc-l">Instagram</div><div className="cc-h">{p.ig_handle}</div></div></div>}
              {p.wa_number&&<div className="cc-chip wa"><div className="cc-ic">💬</div><div className="cc-body"><div className="cc-l">WhatsApp</div><div className="cc-h">{p.wa_number}</div></div></div>}
            </div>
          )}

          {ce==="accepted"&&(
            <div>
              <div className="m-sh"><div className="m-sh-t">Recent Activity</div><div className="m-sh-c">Last {mini.length}</div></div>
              <div className="mini-feed">
                {mini.length?mini.map(e=>(
                  <div key={e.id} className="mf-item">
                    <div className={"mf-dot "+(TYPE_ICON[e.type]||"gain")}>{e.type==="transfer"?"⇄":e.type==="apply"?"↑":e.type==="badge"||e.type==="achievement"?"★":"◆"}</div>
                    <div className="mf-body"><div className="mf-t">{miniText(e)}</div><div className="mf-tm">{timeAgo(e.created_at)}</div></div>
                  </div>
                )):<div className="mf-empty">No recent activity yet</div>}
              </div>
            </div>
          )}

          <div className="m-sh"><div className="m-sh-t">Badges</div><div className="m-sh-c">{earned} / {badgeKeys.length}</div></div>
          <div className="badge-grid">
            {badgeKeys.map(k=>{
              const on=p.badges&&p.badges[k];
              return (
                <div key={k} className={"badge"+(on?" earned":"")}>
                  {on&&<div className="badge-check"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#0B0E2C" strokeWidth="4" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>}
                  <div className={"badge-ic "+k}>{BADGES[k].i}</div><div className="badge-n">{BADGES[k].n}</div>
                </div>
              );
            })}
          </div>

          {pv==="accepted"&&(
            <div>
              <div className="m-sh"><div className="m-sh-t">Edit Connection · what you reveal</div></div>
              <div className="edit-conn">
                <div className="ec-row"><div><div className="ec-lbl">Show my Instagram</div><div className="ec-sub">Always your choice</div></div><div className={"toggle"+(myIg?" on":"")} onClick={()=>saveShares("ig",!myIg)}></div></div>
                <div className="ec-row"><div><div className="ec-lbl">Show my WhatsApp</div><div className="ec-sub">Always your choice</div></div><div className={"toggle"+(myWa?" on":"")} onClick={()=>saveShares("wa",!myWa)}></div></div>
              </div>
            </div>
          )}

          {ce!=="accepted"&&pv!=="accepted"&&<div className="locked-note">🔒 Connect to see full profile & activity</div>}

          {me.role==="admin"&&(
            <div className="admin-box">
              <div className="m-sh-t" style={{color:"#FFB547",marginBottom:10}}>CE Admin Controls</div>
              <div className="msend" style={{marginBottom:10}}>
                <select className="m-select" value={award} onChange={e=>setAward(e.target.value)}>
                  {badgeKeys.map(k=><option key={k} value={k}>{BADGES[k].i} {BADGES[k].n}</option>)}
                </select>
                <button className="m-btn" onClick={awardBadge}>Award</button>
              </div>
              <div className="msend">
                <input className="m-input" placeholder="Achievement text…" value={ach} onChange={e=>setAch(e.target.value)}/>
                <button className="m-btn green" onClick={assignAch}>Announce</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </>
  );
}

function App() {
  const [session,setSession]=useState(null);
  const [me,setMe]=useState(null); const [priv,setPriv]=useState(null);
  const [tab,setTab]=useState("home"); const [sub,setSub]=useState(null);
  const [feed,setFeed]=useState([]); const [notifs,setNotifs]=useState([]);
  const [activities,setActivities]=useState([]); const [users,setUsers]=useState([]);
  const [query,setQuery]=useState(""); const [openId,setOpenId]=useState(null);
  const [toast,setToast]=useState(""); const tr=useRef();
  function flash(m){setToast(m);clearTimeout(tr.current);tr.current=setTimeout(()=>setToast(""),2600);}

  useEffect(()=>{ sb.auth.getSession().then(({data})=>setSession(data.session)); const {data:s}=sb.auth.onAuthStateChange((_e,ss)=>setSession(ss)); return ()=>s.subscription.unsubscribe(); },[]);
  const uid=session?.user?.id;

  const loadMe=useCallback(async()=>{ if(!uid)return; const{data:p}=await sb.from("profiles").select("*").eq("id",uid).maybeSingle(); setMe(p); const{data:pv}=await sb.from("user_private").select("*").eq("user_id",uid).maybeSingle(); setPriv(pv); },[uid]);
  const loadFeed=useCallback(async()=>{ const{data}=await sb.from("activity_events").select("*, actor:profiles!activity_events_actor_id_fkey(id,name,avatar_url,badges,role,university), target:profiles!activity_events_target_id_fkey(name)").order("created_at",{ascending:false}).limit(60); setFeed(data||[]); },[]);
  const loadNotifs=useCallback(async()=>{ if(!uid)return; const{data}=await sb.from("notifications").select("*, actor:profiles!notifications_actor_id_fkey(id,name,avatar_url,role)").eq("recipient_id",uid).order("created_at",{ascending:false}).limit(40); setNotifs(data||[]); },[uid]);
  const loadUsers=useCallback(async(q)=>{ const{data}=await sb.rpc("search_users",{q:q||""}); setUsers(data||[]); },[]);

  useEffect(()=>{ if(uid){ loadMe(); loadFeed(); loadNotifs(); loadUsers(""); sb.from("activities").select("*").then(({data})=>setActivities(data||[])); } },[uid]);
  useEffect(()=>{ if(!uid)return; const ch=sb.channel("live-"+uid)
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"activity_events"},()=>{loadFeed();loadMe();})
    .on("postgres_changes",{event:"*",schema:"public",table:"notifications",filter:`recipient_id=eq.${uid}`},()=>{loadNotifs();loadMe();})
    .subscribe(); return ()=>sb.removeChannel(ch); },[uid,loadFeed,loadNotifs,loadMe]);

  if(!session) return <Auth/>;
  if(!me) return <div className="empty" style={{paddingTop:80}}>Loading your profile…</div>;
  const unread=notifs.filter(n=>!n.read).length;

  async function markAlertsRead(){ await sb.from("notifications").update({read:true}).eq("recipient_id",uid).eq("read",false); loadNotifs(); }
  function goTab(t){ setSub(null); setTab(t); if(t==="alerts") setTimeout(markAlertsRead,600); }

  let screen;
  if(sub==="redeem") screen=<Redeem back={()=>setSub(null)} points={priv?priv.points:0}/>;
  else if(sub==="scan") screen=<Scan back={()=>setSub(null)}/>;
  else if(sub==="giveaways") screen=<Giveaways back={()=>setSub(null)}/>;
  else if(tab==="home") screen=<Home me={me} priv={priv} feed={feed} unread={unread} openProfile={setOpenId} goSub={setSub} goTab={goTab}/>;
  else if(tab==="net") screen=<Network users={users} query={query} setQuery={q=>{setQuery(q);loadUsers(q);}} openProfile={setOpenId}/>;
  else if(tab==="apply") screen=<Apply activities={activities} onApply={async(a)=>{const{data}=await sb.rpc("apply_to_activity",{activity:a.id}); if(data&&data.error){flash(data.error);return;} flash(`Applied to ${a.name}`); loadFeed();}}/>;
  else if(tab==="alerts") screen=<Alerts notifs={notifs} me={me} openProfile={setOpenId} reload={()=>{loadNotifs();loadFeed();loadUsers(query);}} flash={flash}/>;
  else if(tab==="me") screen=<MeProfile me={me} priv={priv} reload={loadMe} setPriv={setPriv} flash={flash}/>;

  const ICON = {
    home:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>,
    net:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
    alerts:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>,
    me:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>,
  };

  return (
    <div>
      {screen}
      <div className="bn">
        <div className="nb">
          <div className={"ni"+(tab==="home"&&!sub?" act":"")} onClick={()=>goTab("home")}><div className="ni-bg">{ICON.home}</div><span>Home</span></div>
          <div className={"ni"+(tab==="net"&&!sub?" act":"")} onClick={()=>goTab("net")}><div className="ni-bg">{ICON.net}</div><span>Network</span></div>
          <div className="ns" onClick={()=>goTab("apply")}><svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M13 2 3 14h7v8l10-12h-7z"/></svg></div>
          <div className={"ni"+(tab==="alerts"&&!sub?" act":"")} onClick={()=>goTab("alerts")}><div className="ni-bg">{ICON.alerts}{unread>0&&<span className="nd"></span>}</div><span>Alerts</span></div>
          <div className={"ni"+(tab==="me"&&!sub?" act":"")} onClick={()=>goTab("me")}><div className="ni-bg">{ICON.me}</div><span>Profile</span></div>
        </div>
      </div>
      {openId&&<ProfileModal targetId={openId} me={me} onClose={()=>setOpenId(null)} flash={flash} reload={()=>{loadFeed();loadUsers(query);loadMe();loadNotifs();}}/>}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
